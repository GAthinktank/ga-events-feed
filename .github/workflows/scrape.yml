name: Refresh feeds

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'manual_events.yml'
      - 'manual_excludes.yml'
      - 'scraper/**'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Run scraper
        working-directory: scraper
        run: python main.py

      - name: Commit updated data
        run: |
          git config user.name  "ga-feed-bot"
          git config user.email "ga-feed-bot@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh feed data $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase origin main
            git push
          fi
